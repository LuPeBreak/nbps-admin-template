services:
  postgres:
    image: postgres:17-alpine
    container_name: nbps-postgres
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: nbps_dev
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
